<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: system-ui, sans-serif;
            font-size: 13px;
            margin: 0;
            padding: 12px;
            width: min-content;
            min-width: 260px;
        }
        label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            white-space: nowrap;
        }
        label + label {
            margin-top: 8px;
        }
        .hint {
            margin: 0;
            color: #666;
        }
        .hint + .hint {
            margin-top: 4px;
        }
        .hint + label {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <p class="hint">Experimental: these rely on LeetCode page internals and may stop working if the site changes.</p>
    <p class="hint">They also send extra GraphQL requests, which may run into LeetCode's rate limits.</p>
    <p class="hint">If LeetCode starts rate-limiting you, switch these options off.</p>
    <label>
        <input type="checkbox" id="comment-counts">
        <span>Show dislike counts on comments</span>
    </label>
    <label>
        <input type="checkbox" id="solution-list-counts">
        <span>Show dislike counts in the solutions list</span>
    </label>
    <script src="popup.js"></script>
</body>
</html>
